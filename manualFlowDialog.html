<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; font-size: 15px; background: #f8f9fa; color: #202124; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #header { background: #1a73e8; color: white; padding: 14px 20px; flex-shrink: 0; }
    #header-top { display: flex; align-items: center; justify-content: space-between; }
    #header h2 { font-size: 17px; font-weight: 600; }
    #stats { display: flex; gap: 12px; }
    .stat { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 12px; font-size: 13px; }
    #paper-title { font-size: 13px; opacity: 0.9; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #flow-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    #flow-badge { background: rgba(255,255,255,0.25); border-radius: 12px; padding: 3px 12px; font-size: 13px; font-weight: 600; }
    #progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; overflow: hidden; }
    #progress-fill { height: 100%; background: white; border-radius: 3px; transition: width 0.4s ease; }
    #filter-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #filter-row span { font-size: 12px; opacity: 0.85; }
    #flow-filter, #kat-filter { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 3px 10px; font-size: 13px; cursor: pointer; }
    #flow-filter option, #kat-filter option { background: #1a73e8; color: white; }
    #body { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 16px 20px; gap: 12px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .section-label { font-size: 12px; font-weight: 700; color: #5f6368; text-transform: uppercase; letter-spacing: 0.8px; }
    #prompt-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #prompt-box { flex: 1; background: white; border: 1px solid #dadce0; border-radius: 10px; padding: 14px 16px; font-size: 14px; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; color: #3c4043; min-height: 0; }
    #prompt-buttons { display: flex; gap: 8px; }
    #copy-btn { background: #e8f0fe; color: #1a73e8; border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #copy-btn:hover { background: #d2e3fc; }
    #copy-btn.copied { background: #e6f4ea; color: #137333; }
    #gemini-btn { background: #1a73e8; color: white; border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #gemini-btn:hover { background: #1557b0; }
    #gemini-btn.opened { background: #137333; }
    #response-section { flex-shrink: 0; }
    #response-box { width: 100%; height: 160px; padding: 12px 14px; border: 2px solid #dadce0; border-radius: 10px; font-size: 14px; font-family: 'Roboto Mono', monospace; resize: none; line-height: 1.5; background: white; transition: border-color 0.2s; }
    #response-box:focus { outline: none; border-color: #1a73e8; }
    #response-box.valid   { border-color: #34a853; }
    #response-box.invalid { border-color: #fbbc04; }
    #json-hint { font-size: 12px; margin-top: 5px; min-height: 16px; color: #5f6368; }
    #json-hint.valid   { color: #137333; }
    #json-hint.invalid { color: #b06000; }
    #footer { flex-shrink: 0; padding: 12px 20px; background: white; border-top: 1px solid #dadce0; display: flex; align-items: center; gap: 10px; }
    #weiter-btn { flex: 1; background: #1a73e8; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    #weiter-btn:hover:not(:disabled) { background: #1557b0; }
    #weiter-btn:disabled { background: #9aa0a6; cursor: default; }
    #skip-btn { background: white; color: #5f6368; border: 1.5px solid #dadce0; border-radius: 8px; padding: 12px 18px; font-size: 14px; cursor: pointer; }
    #skip-btn:hover { background: #f1f3f4; }
    #status-msg { font-size: 13px; padding: 8px 14px; border-radius: 8px; flex: 1; text-align: center; display: none; }
    #status-msg.success { background: #e6f4ea; color: #137333; display: block; }
    #status-msg.error   { background: #fce8e6; color: #c5221f; display: block; }
#status-msg.info { background: #e8f0fe; color: #1a73e8; display: block; }
    #status-msg.warning { background: #fef7e0; color: #b06000; display: block; }
    #bg-save-indicator { position: fixed; bottom: 70px; right: 16px; background: rgba(0,0,0,0.65); color: white; font-size: 12px; padding: 5px 12px; border-radius: 20px; display: none; align-items: center; gap: 6px; z-index: 100; }
    #bg-save-indicator.visible { display: flex; }
    .bg-spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    #next-preview { flex-shrink: 0; background: #f1f3f4; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #5f6368; display: none; }
    #next-preview strong { color: #202124; }
    #loading { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5f6368; font-size: 15px; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 4px solid #dadce0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #done-screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #5f6368; }
    #done-screen .emoji { font-size: 52px; }
    #done-screen h3 { font-size: 20px; color: #137333; }
    .done-stats { display: flex; gap: 20px; margin-top: 8px; }
    .done-stat { text-align: center; background: white; border: 1px solid #dadce0; border-radius: 10px; padding: 12px 24px; }
    .done-stat .num { font-size: 28px; font-weight: 700; color: #1a73e8; }
    .done-stat .lbl { font-size: 12px; color: #5f6368; margin-top: 2px; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h2>📋 Manual Flow</h2>
    <div id="stats">
      <span class="stat">✅ <span id="stat-done">0</span></span>
      <span class="stat">⏭ <span id="stat-skipped">0</span></span>
    </div>
  </div>
  <div id="paper-title">Lade...</div>
  <div id="flow-row">
    <span id="flow-badge">–</span>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="filter-row">
    <span>Flow:</span>
    <select id="flow-filter" onchange="onFilterChange()">
      <option value="ALLE">– Alle Flows –</option>
      <option value="RESEARCHER">1 · Researcher</option>
      <option value="TRIAGE">2 · Triage</option>
      <option value="METADATEN">3 · Metadaten</option>
      <option value="MASTER_ANALYSE">4 · Master Analyse</option>
      <option value="REDAKTION">5 · Redaktion</option>
      <option value="FAKTENCHECK">6 · Faktencheck</option>
      <option value="REVIEW">7 · Review</option>
    </select>
    <span>Thema:</span>
    <select id="kat-filter" onchange="onFilterChange()">
      <option value="ALLE">– Alle Themen –</option>
      <option value="Diabetes Typ 1">🩸 Diabetes Typ 1</option>
      <option value="Diabetes Typ 2">🩸 Diabetes Typ 2</option>
      <option value="Diabetes Gesamt">🩸 Diabetes Gesamt</option>
      <option value="Immunologie">🧬 Immunologie</option>
      <option value="Neurologie">🧠 Neurologie</option>
    </select>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div>Nächsten Flow laden...</div>
</div>

<div id="body" style="display:none">
  <div id="prompt-section">
    <div class="section-header">
      <span class="section-label">Prompt</span>
      <div id="prompt-buttons">
        <button id="copy-btn" onclick="copyPrompt()">⎘ Kopieren</button>
        <button id="gemini-btn" onclick="openInGemini()">✦ In Gemini öffnen</button>
      </div>
    </div>
    <div id="prompt-box"></div>
  </div>
  <div id="next-preview">⏭️ Nächster bereit: <strong id="next-info">–</strong></div>
  <div id="response-section">
    <div class="section-header"><span class="section-label">Gemini-Antwort</span></div>
    <textarea id="response-box"
      placeholder="Antwort hier einfügen (Strg+Enter zum Speichern)..."
      oninput="validateJson(this.value)"
      onkeydown="handleKeydown(event)"></textarea>
    <div id="json-hint"></div>
  </div>
</div>

<div id="done-screen">
  <div class="emoji">🎉</div>
  <h3>Alle Flows erledigt!</h3>
  <div class="done-stats">
    <div class="done-stat"><div class="num" id="done-stat-done">0</div><div class="lbl">Erledigt</div></div>
    <div class="done-stat"><div class="num" id="done-stat-skipped">0</div><div class="lbl">Übersprungen</div></div>
  </div>
</div>

<div id="footer">
  <button id="weiter-btn" onclick="submitResponse()" disabled>✓ Speichern & Weiter</button>
  <button id="skip-btn" onclick="skipCurrent()">Überspringen</button>
  <div id="status-msg"></div>
</div>

<div id="bg-save-indicator">
  <div class="bg-spinner"></div>
  <span id="bg-save-text">Speichert im Hintergrund...</span>
</div>

<script>
  var currentItem           = null;
  var nextItem              = null;
  var statDone              = 0;
  var statSkipped           = 0;
  var isSubmitting          = false;
  var currentFilter         = 'ALLE';
  var currentKatFilter      = 'ALLE';
  var lastSubmittedResponse = '';
  var duplicateWarned       = false;
  var bgSaveCount           = 0;
  var inFlightItems         = {};

  var flowLabels = {
    'RESEARCHER': '1/7 Researcher', 'TRIAGE': '2/7 Triage',
    'METADATEN': '3/7 Metadaten', 'MASTER_ANALYSE': '4/7 Master Analyse',
    'REDAKTION': '5/7 Redaktion', 'FAKTENCHECK': '6/7 Faktencheck', 'REVIEW': '7/7 Review'
  };
  var flowProgress = {
    'RESEARCHER': 14, 'TRIAGE': 28, 'METADATEN': 42,
    'MASTER_ANALYSE': 57, 'REDAKTION': 71, 'FAKTENCHECK': 85, 'REVIEW': 100
  };

  function init() {
    showLoading(true);
    google.script.run
      .withSuccessHandler(onItemLoaded)
      .withFailureHandler(onError)
      .getNextFlowItem(currentFilter, Object.keys(inFlightItems), currentKatFilter);
  }

  function onItemLoaded(item) {
    if (!item) { showDone(); return; }
    currentItem = item;
    renderItem(item);
    preloadNext();
  }

  function preloadNext() {
    var skipKeys = Object.keys(inFlightItems).slice();
    if (currentItem) {
      var currentKey = currentItem.uuid + '|' + currentItem.flowName;
      if (skipKeys.indexOf(currentKey) < 0) skipKeys.push(currentKey);
    }
    setTimeout(function() {
      google.script.run
        .withSuccessHandler(function(item) {
          nextItem = item;
          if (item) {
            document.getElementById('next-preview').style.display = 'block';
            document.getElementById('next-info').textContent =
              (flowLabels[item.flowName] || item.flowName) + ' – ' +
              item.titel.substring(0, 50) + (item.titel.length > 50 ? '…' : '');
          } else {
            document.getElementById('next-preview').style.display = 'none';
          }
        })
        .withFailureHandler(function() { nextItem = null; })
        .getNextFlowItem(currentFilter, skipKeys, currentKatFilter);
    }, 800);
  }

  function onFilterChange() {
    currentFilter    = document.getElementById('flow-filter').value;
    currentKatFilter = document.getElementById('kat-filter').value;
    nextItem         = null;
    statDone = 0; statSkipped = 0;
    lastSubmittedResponse = ''; duplicateWarned = false;
    document.getElementById('stat-done').textContent    = 0;
    document.getElementById('stat-skipped').textContent = 0;
    document.getElementById('done-screen').style.display = 'none';
    showLoading(true);
    google.script.run
      .withSuccessHandler(onItemLoaded)
      .withFailureHandler(onError)
      .getNextFlowItem(currentFilter, Object.keys(inFlightItems), currentKatFilter);
  }

  function renderItem(item) {
    showLoading(false);
    document.getElementById('body').style.display = 'flex';
    document.getElementById('paper-title').textContent =
      item.titel.substring(0, 90) + (item.titel.length > 90 ? '…' : '');
    document.getElementById('flow-badge').textContent  = flowLabels[item.flowName] || item.flowName;
    document.getElementById('progress-fill').style.width = (flowProgress[item.flowName] || 0) + '%';
    document.getElementById('prompt-box').textContent  = item.prompt;
    var gb = document.getElementById('gemini-btn');
    gb.className = ''; gb.textContent = '✦ In Gemini öffnen';
    var rb = document.getElementById('response-box');
    rb.value = ''; rb.className = ''; rb.focus();
    document.getElementById('json-hint').textContent      = '';
    document.getElementById('json-hint').className        = '';
    document.getElementById('weiter-btn').disabled        = true;
    document.getElementById('status-msg').style.display   = 'none';
    document.getElementById('next-preview').style.display = 'none';
    document.getElementById('stat-done').textContent      = statDone;
    document.getElementById('stat-skipped').textContent   = statSkipped;
    duplicateWarned = false;
    isSubmitting    = false;
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-box').textContent;
    navigator.clipboard.writeText(text).then(function() {
      document.getElementById('copy-btn').textContent = 'Kopiert! ✓';
      document.getElementById('copy-btn').classList.add('copied');
      setTimeout(function() {
        document.getElementById('copy-btn').textContent = '⎘ Kopieren';
        document.getElementById('copy-btn').classList.remove('copied');
      }, 2500);
    }).catch(function() { fallbackCopy(text); });
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }

  function openInGemini() {
    var text = document.getElementById('prompt-box').textContent;
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
window.open('https://gemini.google.com/app', '_blank');
    var btn = document.getElementById('gemini-btn');
    btn.classList.add('opened'); btn.textContent = '✓ Geöffnet – Strg+V einfügen';
    setTimeout(function() { document.getElementById('response-box').focus(); }, 500);
  }

  function validateJson(val) {
    var box  = document.getElementById('response-box');
    var hint = document.getElementById('json-hint');
    var btn  = document.getElementById('weiter-btn');
    if (!val.trim()) { box.className = ''; hint.textContent = ''; hint.className = ''; btn.disabled = true; return; }
    var clean = val.replace(/```json/g,'').replace(/```/g,'').trim();
    var fb    = clean.indexOf('{');
    if (fb > 0) clean = clean.substring(fb);
    try {
      JSON.parse(clean);
      box.className = 'valid'; hint.textContent = '✓ Gültiges JSON'; hint.className = 'valid';
    } catch(e) {
      box.className = 'invalid'; hint.textContent = '⚠ Kein vollständiges JSON – wird trotzdem gespeichert'; hint.className = 'invalid';
    }
    btn.disabled = false;
  }

  function handleKeydown(e) {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      if (!document.getElementById('weiter-btn').disabled) submitResponse();
    }
  }

  function bgSaveStart() {
    bgSaveCount++;
    document.getElementById('bg-save-text').textContent =
      bgSaveCount > 1 ? bgSaveCount + ' Saves im Hintergrund...' : 'Speichert im Hintergrund...';
    document.getElementById('bg-save-indicator').classList.add('visible');
  }

  function bgSaveEnd() {
    bgSaveCount = Math.max(0, bgSaveCount - 1);
    if (bgSaveCount === 0) document.getElementById('bg-save-indicator').classList.remove('visible');
    else document.getElementById('bg-save-text').textContent = bgSaveCount + ' Saves im Hintergrund...';
  }

  function submitResponse() {
    if (!currentItem || isSubmitting) return;
    var response = document.getElementById('response-box').value.trim();
    if (!response) { showStatus('Bitte zuerst die Gemini-Antwort einfügen.', 'error'); return; }

    if (response === lastSubmittedResponse && lastSubmittedResponse !== '' && !duplicateWarned) {
      showStatus('⚠️ Diese Antwort ist identisch mit der letzten! Nochmal klicken um trotzdem zu speichern.', 'warning');
      duplicateWarned = true; return;
    }
    duplicateWarned = false;
    isSubmitting    = true;

    var saveItem     = currentItem;
    var saveResponse = response;
    var itemKey      = saveItem.uuid + '|' + saveItem.flowName;
    lastSubmittedResponse = response;

    inFlightItems[itemKey] = true;

    statDone++;
    document.getElementById('stat-done').textContent = statDone;
    showStatus('✓ Gespeichert', 'success');
    goToNext();
    isSubmitting = false;

    bgSaveStart();
    google.script.run
      .withSuccessHandler(function(result) {
        delete inFlightItems[itemKey];
        bgSaveEnd();
        if (!result || !result.success) {
          showStatus('⚠️ Speicher-Fehler: ' + (result ? result.error : 'Unbekannt'), 'warning');
        }
        // Falls Done-Screen angezeigt wird → prüfen ob neue Flows entstanden sind
        if (document.getElementById('done-screen').style.display !== 'none') {
          var skipKeys = Object.keys(inFlightItems).slice();
          google.script.run
            .withSuccessHandler(function(item) {
              if (item) { currentItem = item; document.getElementById('done-screen').style.display = 'none'; renderItem(item); preloadNext(); }
            })
            .withFailureHandler(function() {})
            .getNextFlowItem(currentFilter, skipKeys, currentKatFilter);
        }
      })
      .withFailureHandler(function(err) {
        delete inFlightItems[itemKey];
        bgSaveEnd();
        showStatus('⚠️ Speicher-Fehler: ' + (err.message || err), 'warning');
      })
      .submitFlowResponse(saveItem.uuid, saveItem.flowName, saveItem.trigger, saveItem.output, saveResponse);
  }

  function skipCurrent() {
    if (isSubmitting) return;
    statSkipped++;
    showStatus('Übersprungen', 'info');
    setTimeout(goToNext, 700);
  }

  function goToNext() {
    if (nextItem) {
      var item = nextItem;
      nextItem = null;
      currentItem = item;
      renderItem(item);
      preloadNext();
    } else {
      showLoading(true);
      var skipKeys = Object.keys(inFlightItems).slice();
      google.script.run
        .withSuccessHandler(function(item) {
          if (!item) { showDone(); return; }
          currentItem = item; renderItem(item); preloadNext();
        })
        .withFailureHandler(onError)
        .getNextFlowItem(currentFilter, skipKeys, currentKatFilter);
    }
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
    document.getElementById('body').style.display    = show ? 'none' : 'flex';
  }

  function showDone() {
    document.getElementById('loading').style.display     = 'none';
    document.getElementById('body').style.display        = 'none';
    document.getElementById('done-screen').style.display = 'flex';
    document.getElementById('done-stat-done').textContent    = statDone;
    document.getElementById('done-stat-skipped').textContent = statSkipped;
    document.getElementById('header').style.background = '#137333';
    document.querySelector('#header h2').textContent = '✅ Alle Flows erledigt';
    document.getElementById('paper-title').textContent = '';
    document.getElementById('flow-badge').textContent  = '';
  }

  function showStatus(msg, type) {
    var el = document.getElementById('status-msg');
    el.textContent = msg; el.className = type; el.style.display = 'block';
  }

  function onError(err) {
    showLoading(false);
    showStatus('Fehler beim Laden: ' + (err.message || err), 'error');
  }

  init();
</script>
</body>
</html>
